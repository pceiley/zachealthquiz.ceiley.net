<!doctype html>

        <style>
            body {
                margin: 0;
                font-family: Arial;
                background: #0b0f14;
                color: white;
                overflow: hidden;
            }

            .bg {
                position: fixed;
                inset: 0;
                background: url("https://drive.google.com/thumbnail?id=1kmwcWZ3z-QmjjS3AMimteHg4y8nDWwHE&sz=w2000")
                    no-repeat center center;
                background-size: cover;
                z-index: 0;
            }

            .bg::after {
                content: "";
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
            }

            .screen {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                z-index: 2;
                padding: 20px;
            }

            #hud {
                position: fixed;
                top: 10px;
                left: 10px;
                background: rgba(0, 0, 0, 0.75);
                padding: 10px;
                border-radius: 10px;
                width: 220px;
                z-index: 9999;
            }

            #hud img {
                width: 42px;
                height: 42px;
                border-radius: 10px;
                object-fit: cover;
            }

            .avatarGrid {
                display: grid;
                grid-template-columns: repeat(4, 80px);
                gap: 10px;
                justify-content: center;
            }

            .avatarTile {
                width: 80px;
                height: 80px;
                border-radius: 12px;
                overflow: hidden;
                cursor: pointer;
                position: relative;
                background: #222;
                border: 2px solid transparent;
                transition: 0.2s;
            }

            .avatarTile:hover {
                transform: scale(1.05);
            }
            .avatarTile.selected {
                border: 2px solid cyan;
            }
            .avatarTile img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .free {
                border-color: grey;
            }
            .lightblue {
                border-color: lightblue;
            }
            .green {
                border-color: limegreen;
            }
            .darkblue {
                border-color: deepskyblue;
            }
            .orange {
                border-color: orange;
            }
            .red {
                border-color: red;
            }

            .locked::after {
                content: "";
                position: absolute;
                inset: 0;
                background: url("https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Crystal128-lock-overlay.svg/960px-Crystal128-lock-overlay.svg.png");
                background-size: cover;
                opacity: 0.85;
            }

            #quizBox {
                position: fixed;
                inset: 0;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #1a1a1a;
                z-index: 10;
                padding: 20px;
            }

            .quizBtn {
                margin: 8px;
                padding: 15px;
                border: none;
                border-radius: 10px;
                background: #2f2f2f;
                color: white;
                cursor: pointer;
            }
        </style>
    </head>

            /* SAVE */
            function save() {
                localStorage.setItem("game", JSON.stringify(data));

                // Leaderboard update
                let leaderboard =
                    JSON.parse(localStorage.getItem("leaderboard")) || [];
                leaderboard = leaderboard.filter((x) => x.code !== data.code);
                leaderboard.push({
                    name: data.name || "Unknown",
                    points: data.points,
                    avatar: data.avatar,
                    code: data.code,
                });
                leaderboard.sort((a, b) => b.points - a.points);
                leaderboard = leaderboard.slice(0, 20);
                localStorage.setItem(
                    "leaderboard",
                    JSON.stringify(leaderboard),
                );

                updateHUD();
                render();
            }

            function updateHUD() {
                hudName.innerText = data.name || "";
                hudAvatar.src = data.avatar || avatars[0].src;
                pointsText.innerText = data.points;
                codeText.innerText = data.code;
            }

            /* RENDER */
            function render() {
                avatarGrid.innerHTML = "";
                avatars.forEach((a) => {
                    let d = document.createElement("div");
                    d.className = "avatarTile " + a.rarity;

                    let img = document.createElement("img");
                    img.src = a.src;

                    d.appendChild(img);

                    d.onclick = () => {
                        if (data.points < a.cost) return;
                        data.avatar = a.src;
                        save();
                        if (a.sound) playSound(a.sound);
                    };

                    avatarGrid.appendChild(d);
                });

                    q: "When people talk about resilience in spiritual health, they mean:",
                    a: [
                        "Being so strong that nothing ever makes you sad",
                        "Using your inner beliefs and values to help you bounce back from hard times",
                        "Being able to hold your breath underwater for a long time",
                        "Never changing your mind about anything",
                    ],
                    c: 1,
                },

                {
                    q: "What does it mean to have values?",
                    a: [
                        "Having a lot of money in your piggy bank",
                        "Things that are important to you, like being honest or helpful",
                        "Being the loudest person in the classroom",
                        "Knowing the names of all the planets",
                    ],
                    c: 1,
                },
            ];
            function expandTo10(arr) {
                let out = [];

                while (out.length < 10) {
                    out = out.concat(arr);
                }

                return out.slice(0, 10);
            }

            const quizDB = {
                physical: expandTo10(physicalBase),
                mental: expandTo10(mentalBase),
                social: expandTo10(socialBase),
                emotionalSpiritual: expandTo10(emotionalSpiritualBase),
            };

            /* MIXED 20 */
            function buildMixed20() {
                let pool = [
                    ...quizDB.physical,
                    ...quizDB.mental,
                    ...quizDB.social,
                    ...quizDB.emotionalSpiritual,
                ];

                pool = pool.sort(() => Math.random() - 0.5);
                return pool.slice(0, 20);
            }

            quizDB.mixed20 = buildMixed20();

            /* ENGINE */
            let quiz = [];
            let i = 0;

            function openQuiz(type) {
                data.name = nameInput.value;
                save();
                quiz = quizDB[type] || [];
                i = 0;

                quizBox.style.display = "flex";
                home.style.display = "none";

                mixedMusic.pause();
                physicalMusic.pause();
                mentalMusic.pause();
                socialMusic.pause();

                if (type === "mixed20") {
                    mixedMusic.currentTime = 0;
                    mixedMusic.play();
                }

                if (type === "physical") physicalMusic.play();
                if (type === "mental") mentalMusic.play();
                if (type === "social") socialMusic.play();

                next();
            }

            function next() {
                if (i >= quiz.length) {
                    quizBox.style.display = "none";
                    home.style.display = "flex";

                    mixedMusic.pause();
                    physicalMusic.pause();
                    mentalMusic.pause();
                    socialMusic.pause();
                    return;
                }

                let q = quiz[i++];
                questionText.innerText = q.q;
                answers.innerHTML = "";

                q.a.forEach((x, idx) => {
                    let b = document.createElement("button");
                    b.className = "quizBtn";
                    b.innerText = x;

                    b.onclick = () => {
                        if (idx === q.c) {
                            data.points += 5;
                            correctSound.currentTime = 0;
                            correctSound.play();
                        }
                        save();
                        next();
                    };

                    answers.appendChild(b);
                });
            }

            /* SAVE */
            function startGame() {
                data.name = nameInput.value;
                save();
            }

            window.onload = () => {
                updateHUD();
                render();
            };

            nameInput.addEventListener("input", () => {
                data.name = nameInput.value;
                save();
            });
        </script>
        <!-- TUTORIAL SCREEN -->
        <div
            id="tutorialScreen"
            style="
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.95);
                z-index: 50000;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                text-align: center;
                padding: 20px;
            "
        >
            <img
                src="https://static.wikia.nocookie.net/fivenightsatfreddys/images/f/fe/PhoneGuyUCN.png/revision/latest/scale-to-width/360?cb=20181106091057"
                style="
                    width: 300px;
                    max-width: 80%;
                    border-radius: 20px;
                    margin-bottom: 20px;
                    box-shadow: 0 0 25px black;
                "
            />

            <h1 style="font-size: 42px; margin-bottom: 10px">
                Welcome to Health Quizzes for Life
            </h1>

            <p
                style="
                    max-width: 800px;
                    font-size: 22px;
                    line-height: 1.6;
                    background: rgba(0, 0, 0, 0.4);
                    padding: 20px;
                    border-radius: 16px;
                "
            >
                Welcome to the game. In this game you can complete health
                quizzes, earn points, unlock avatars and improve your
                understanding of physical, mental, social and emotional health.
            </p>

            <div style="display: flex; gap: 15px; margin-top: 25px">
                <button
                    id="startTutorial"
                    style="
                        padding: 16px 32px;
                        font-size: 22px;
                        border: none;
                        border-radius: 14px;
                        background: #00aa44;
                        color: white;
                        cursor: pointer;
                    "
                >
                    Start Tutorial
                </button>

                <button
                    id="skipTutorial"
                    style="
                        padding: 16px 32px;
                        font-size: 22px;
                        border: none;
                        border-radius: 14px;
                        background: #cc0000;
                        color: white;
                        cursor: pointer;
                    "
                >
                    Skip Tutorial
                </button>
            </div>
        </div>

        <script>
            /* AUDIO */
            const tutorialAudio = new Audio(
                "https://media.vocaroo.com/mp3/16w9olvZXcps",
            );

            tutorialAudio.volume = 1;

            /* ELEMENTS */
            const tutorialScreen = document.getElementById("tutorialScreen");
            const skipTutorial = document.getElementById("skipTutorial");
            const startTutorial = document.getElementById("startTutorial");

            /* LOCK GAME */
            document.body.style.pointerEvents = "none";
            tutorialScreen.style.pointerEvents = "auto";

            /* CLOSE */
            function closeTutorial() {
                tutorialScreen.style.display = "none";

                document.body.style.pointerEvents = "auto";

                tutorialAudio.pause();
            }

            /* START BUTTON */
            startTutorial.onclick = function () {
                tutorialAudio.play();

                startTutorial.style.display = "none";
            };

            /* SKIP */
            skipTutorial.onclick = function () {
                closeTutorial();
            };

            /* AUTO END */
            tutorialAudio.onended = function () {
                closeTutorial();
            };
        </script>

        <!-- LEADERBOARD -->

        <div
            id="leaderboardBox"
            style="
                position: fixed;
                inset: 0;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #111;
                z-index: 20;
                padding: 20px;
                overflow: auto;
            "
        >
            <h1 style="font-size: 50px; margin-bottom: 20px">Leaderboard</h1>

            <div
                id="leaderboardList"
                style="
                    width: 80%;
                    max-width: 700px;
                    background: #222;
                    padding: 20px;
                    border-radius: 20px;
                "
            ></div>

            <button
                onclick="closeLeaderboard()"
                style="
                    margin-top: 20px;
                    padding: 14px 28px;
                    border: none;
                    border-radius: 12px;
                    background: #cc0000;
                    color: white;
                    font-size: 18px;
                    cursor: pointer;
                "
            >
                Close
            </button>
        </div>

        <script>
            function openLeaderboard() {
                let leaderboard =
                    JSON.parse(localStorage.getItem("leaderboard")) || [];
                let html = "<h2>Leaderboard</h2>";
                leaderboard.forEach((p, idx) => {
                    html += `<div>${idx + 1}. ${p.name || "Unknown"} — ${p.points} pts</div>`;
                });
                html += `<br><button onclick="closeLeaderboard()">Back</button>`;
                document.getElementById("leaderboard").innerHTML = html;
                document.getElementById("leaderboard").style.display = "flex";
                home.style.display = "none";
            }

            function closeLeaderboard() {
                document.getElementById("leaderboard").style.display = "none";
                home.style.display = "flex";
            }
        </script>
